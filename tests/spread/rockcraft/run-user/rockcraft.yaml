name: run-user-test
version: latest
summary: A rock with a nonroot user
description: A rock that has a nonroot default OCI user
license: Apache-2.0
base: ubuntu@22.04
run-user: _daemon_
services:
  test:
    override: replace
    command: /usr/bin/sleep [ 1 ]
    startup: enabled
    on-success: shutdown
    on-failure: shutdown
platforms:
  amd64:

parts:
  my-part:
    plugin: nil
    override-overlay: |
      set -x
      useradd -M -U -r test-user
