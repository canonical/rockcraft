summary: Test packing rock with FIPS pebble snap
prepare: |
  sudo pro enable --assume-yes fips
execute: |
  TAG="latest"
  ROCK_FILE="fips-pebble-test_latest_*.rock"

  rockcraft pack --pro=fips --destructive-mode
  sudo rockcraft.skopeo --insecure-policy copy oci-archive:$ROCK_FILE docker-daemon:fips-pebble-test:$TAG

  docker run --rm fips-pebble-test:$TAG exec pebble version | MATCH "\-fips"
restore: |
  rm -rf $ROCK_FILE
  docker rmi -f fips-pebble-test:$TAG
  sudo pro disable --assume-yes fips
