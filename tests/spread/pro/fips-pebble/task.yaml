summary: Test packing rock with FIPS pebble snap
execute: |
  ROCK_FILE="fips-pebble-test_latest_amd64.rock"

  rockcraft pack --pro=fips-updates
  sudo rockcraft.skopeo --insecure-policy copy oci-archive:$ROCK_FILE docker-daemon:fips-pebble-test:latest

  docker run --rm fips-pebble-test:latest exec pebble version | MATCH "\-fips"
restore: |
  rm -rf fips-pebble-test_latest_*.rock
  docker rmi -f fips-pebble-test:latest
