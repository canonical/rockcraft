name: dotnet-runtime
summary: .NET Runtime 10.0
description: A Chiselled rock for the .NET Runtime 10.0
version: chiselled

# Use a "bare" base for an even smaller rock
base: bare

# Meeting requirement R1 by making sure the rock builds on Resolute
build-base: ubuntu@26.04

license: Apache-2.0

# Target architecture is amd64
platforms:
  amd64: # Make sure this value matches your computer's architecture

# For meeting requirement R2, simply don't specify any entrypoint (aka "services")

parts:
  install-dotnet-runtime:
    plugin: nil

    # Based on requirement R3, install version 10.0 of the .NET runtime "standard" slice
    stage-packages:
      - base-files_base
      - dotnet-runtime-10.0_standard

    # Based on requirement R4, create the symbolic link
    override-prime: |
      craftctl default
      ln -sf /usr/lib/dotnet/dotnet usr/bin/
