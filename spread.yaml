project: rockcraft

path: /rockcraft
environment:
  PROJECT_PATH: /rockcraft
  SNAPD_TESTING_TOOLS: $PROJECT_PATH/tools/external/tools
  PATH: /snap/bin:$PATH:$SNAPD_TESTING_TOOLS:$PROJECT_PATH/tools/spread

include:
  - tests/
  - tools/
  - docs/
  - Makefile
  - common.mk
  - uv.lock
  - pyproject.toml
  - rockcraft/

# The default spread timeout is 15 minutes. This is too short for some tests.
kill-timeout: 25m
backends:
  openstack:
    key: '$(HOST: echo "$OS_CREDENTIALS_AMD64_PS7")'
    plan: shared.medium
    halt-timeout: 2h
    wait-timeout: 10m
    proxy: ingress-haproxy.ps7.canonical.com
    cidr-port-rel: ["10.151.96.0/21:5000"]
    volume-auto-delete: true
    environment: &openstack-env
      SNAPD_USE_PROXY: "true"
      HTTP_PROXY: "http://egress.ps7.internal:3128"
      http_proxy: "http://egress.ps7.internal:3128"
      HTTPS_PROXY: "http://egress.ps7.internal:3128"
      https_proxy: "http://egress.ps7.internal:3128"
      no_proxy: "127.0.0.1,127.0.0.53,localhost"
      NO_PROXY: "127.0.0.1,127.0.0.53,localhost"
      NTP_SERVER: "ntp.ps7.internal"
    systems: &openstack-systems
      - ubuntu-20.04-64:
          image: snapd-spread/ubuntu-20.04-64
          workers: 1
          storage: 40G
      - ubuntu-22.04-64:
          image: snapd-spread/ubuntu-22.04-64
          workers: 6
          storage: 40G
      - fedora-44-64:
          image: snapd-spread/fedora-44-64
          workers: 1
          storage: 40G

  openstack-dev:
    type: openstack
    key: '$(HOST: echo "$OS_CREDENTIALS_STG_AMD64_PS7")'
    plan: shared.xsmall
    halt-timeout: 2h
    wait-timeout: 10m
    groups: [default]
    proxy: ingress-haproxy.ps7.canonical.com
    cidr-port-rel: ["10.151.54.0/24:4000"]
    volume-auto-delete: true
    environment: *openstack-env
    systems: *openstack-systems

  lxd:
    systems:
      - ubuntu-22.04:
          workers: 1
          storage: 10G

prepare: |
  # if the 'tools' directory inside the submodule does not exist, then assume the submodule is empty
  if [[ ! -d "$SNAPD_TESTING_TOOLS" ]]; then
    echo "Cannot run spread because submodule 'snapd-testing-tools' is empty. Fetch with 'git submodule update --init' and rerun spread."
    exit 1
  fi

  if os.query is-ubuntu; then
    if [ -n "${HTTP_PROXY:-}" ]; then
      # Persist proxy configuration for Apt
      printf 'Acquire::http::Proxy "%s";\nAcquire::https::Proxy "%s";\n' "${HTTP_PROXY}" "${HTTPS_PROXY}" | tee /etc/apt/apt.conf.d/proxy.conf
    fi
    tempfile="$(mktemp)"
    if ! apt-get update > "$tempfile" 2>&1; then
        cat "$tempfile"
        exit 1
    fi
  fi

  tests.pkgs install snapd

  snap wait system seed.loaded

  # The /snap directory does not exist in some environments
  [ ! -d /snap ] && ln -s /var/lib/snapd/snap /snap

  #shellcheck source=tests/spread/tools.sh
  . tests/spread/tools.sh
  if [ -n "${HTTP_PROXY:-}" ]; then
    # The snapd daemon doesn't see the environment variables, so we must modify its config
    # to use a proxy with it. Came from:
    # https://github.com/canonical/snapd/blob/619cc925793591348db21bb45fa4af65288d2c42/tests/lib/prepare.sh#L90
    tools_setup_snapd_proxy
  fi

  # older linux releases have separate packages for lxd and lxc (lxd-client)
  if [ "$SPREAD_SYSTEM" = "ubuntu-18.04-64" ] || \
     [ "$SPREAD_SYSTEM" = "ubuntu-20.04-64" ] || \
     [ "$SPREAD_SYSTEM" = "fedora-39-64" ]; then
    tests.pkgs remove lxd lxd-client
  else
    tests.pkgs remove lxd
  fi

  # 5.21/stable is the latest stable LTS. Use 5.21/candidate as a "first line of
  # defense" against LXD regressions.
  snap install lxd --channel=5.21/candidate

  # Hold snap refreshes for 24h.
  snap set system refresh.hold="$(date --date=tomorrow +%Y-%m-%dT%H:%M:%S%:z)"
  if ! snap watch --last=auto-refresh?; then
      journalctl -xe
  fi
  if ! snap watch --last=install?; then
      journalctl -xe
  fi

  lxd waitready --timeout=30
  lxd init --auto

  if [ -n "${HTTP_PROXY:-}" ]; then
    # Lxd either can't access or doesn't fallback to the environment variables,
    # so we must set them. This is needed to download remote images.
    lxc config set core.proxy_http "$HTTP_PROXY"
    lxc config set core.proxy_https "$HTTPS_PROXY"
    lxc config set core.proxy_ignore_hosts "$NO_PROXY"
  fi

  snap install docker

  if [ -n "${HTTP_PROXY:-}" ]; then
    # Configure the proxy for the docker daemon through systemd
    mkdir -p /etc/systemd/system/snap.docker.dockerd.service.d/
    printf '[Service]\nEnvironment="HTTP_PROXY=%s"\nEnvironment="HTTPS_PROXY=%s"\nEnvironment="NO_PROXY=%s"\n' "${HTTP_PROXY}" "${HTTPS_PROXY}" "${NO_PROXY}" | tee /etc/systemd/system/snap.docker.dockerd.service.d/override.conf
    systemctl daemon-reload
    snap restart docker
  fi

  # make sure docker is working
  retry -n 10 --wait 2 sh -c 'docker run --rm hello-world'

  install_rockcraft

restore-each: |
  # Cleanup after each task.
  docker system prune -a -f
  if lxc project info rockcraft > /dev/null 2>&1 ; then
    for instance in $(lxc --project=rockcraft list -c n --format csv); do
      # Don't remove the base instance, we want to reuse it between tests
      if ! [[ $instance =~ ^base-instance-* ]]; then
        lxc --project=rockcraft delete --force "$instance"
      fi
    done
  fi

debug-each: |
  # output latest rockcraft log file on test failure
  rockcraft_log_file=$(find /root/.local/state/rockcraft/log/ -name 'rockcraft*.log' | sort -n | tail -n1)
  if [[ -f $rockcraft_log_file ]]; then
    echo -e "rockcraft log file contents:\n----------------------------"
    cat "$rockcraft_log_file"
    echo "----------------------------"
  else
    echo "could not find rockcraft log file (this is not necessarily an error)"
  fi

suites:
  docs/tutorial/code/:
    summary: tests tutorial from the docs
    systems:
      - ubuntu-22.04-64
      - ubuntu-22.04

  docs/how-to/code/:
    summary: tests how-to guides from the docs
    systems:
      - ubuntu-22.04-64
      - ubuntu-22.04

  docs/reference/code/:
    summary: tests reference code from the docs
    systems:
      - ubuntu-22.04-64
      - ubuntu-22.04

  docs/reuse/tutorial/code/:
    summary: tests reusable code from the docs
    systems:
      - ubuntu-22.04-64
      - ubuntu-22.04

  tests/spread/rockcraft/:
    summary: tests for rockcraft core functionality, independent of host system
    systems:
      - ubuntu-22.04-64
      - ubuntu-22.04

  tests/spread/foreign/:
    summary: tests that rockcraft and rocks work on different host systems

  tests/spread/manual/:
    summary: manually-triggered tests, like bigger tests and flaky ones
    manual: true
    systems:
      - ubuntu-22.04-64
      - ubuntu-22.04

  tests/spread/pro/:
    summary: manually-triggered when Ubuntu Pro token is available
    manual: true
    systems:
      - ubuntu-22.04-64
      - ubuntu-22.04
    environment:
      UBUNTU_PRO_TOKEN: '$(HOST: echo "$UBUNTU_PRO_TOKEN")'
    prepare: |
      # Enable Ubuntu Pro

      if [ -n "${HTTP_PROXY:-}" ]; then
        sudo pro config set http_proxy="$http_proxy"
        sudo pro config set https_proxy="$https_proxy"
        echo "Configured Ubuntu Pro to use HTTP_PROXY and HTTPS_PROXY"
      else
        echo "No HTTP_PROXY or HTTPS_PROXY set, skipping proxy configuration for Ubuntu Pro"
      fi
      exit 1

      sudo pro attach --no-auto-enable $UBUNTU_PRO_TOKEN

      # The destructive-mode tests pack with esm-apps
      sudo pro enable --assume-yes esm-apps

      # Enable guest attachment so that Rockcraft can enable Pro on the instances
      sudo pro config set lxd_guest_attach=available
      sudo snap restart lxd

    restore: |
      sudo pro detach --assume-yes
